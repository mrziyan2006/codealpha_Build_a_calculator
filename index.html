<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Calculator</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app" aria-label="Calculator">
      <div class="calculator">
        <div class="display" role="status" aria-live="polite">
          <div class="preview" id="preview">&nbsp;</div>
          <div class="result" id="display">0</div>
        </div>

        <div class="keys" role="group" aria-label="Calculator keys">
          <button class="key key--function" data-action="clear">C</button>
          <button class="key key--operator" data-value="/" aria-label="Divide">
            ÷
          </button>
          <button
            class="key key--operator"
            data-value="*"
            aria-label="Multiply"
          >
            ×
          </button>
          <button
            class="key key--operator"
            data-value="-"
            aria-label="Subtract"
          >
            −
          </button>

          <button class="key" data-value="7">7</button>
          <button class="key" data-value="8">8</button>
          <button class="key" data-value="9">9</button>
          <button class="key key--operator" data-value="+" aria-label="Add">
            +
          </button>

          <button class="key" data-value="4">4</button>
          <button class="key" data-value="5">5</button>
          <button class="key" data-value="6">6</button>
          <button class="key key--equals" data-action="equals">=</button>

          <button class="key" data-value="1">1</button>
          <button class="key" data-value="2">2</button>
          <button class="key" data-value="3">3</button>
          <button
            class="key key--equals key--wide"
            data-action="backspace"
            aria-label="Backspace"
          >
            ⌫
          </button>

          <button class="key key--zero" data-value="0">0</button>
          <button class="key key--decimal" data-value=".">.</button>
        </div>
      </div>
    </main>

    <script src="script.js"></script>
  </body>
</html>
